global
  log stdout format raw local0
  maxconn 128

defaults
  log global
  mode tcp
  option dontlognull
  timeout connect 3s
  timeout client 1m
  timeout server 1m

resolvers docker
  nameserver embedded 127.0.0.11:53
  resolve_retries 30
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s
  hold nx 1s
  hold other 1s
  hold refused 1s
  hold timeout 1s

frontend fake_bedrock
  bind :18080
  default_backend fake_bedrock

backend fake_bedrock
  server fixture fake-bedrock:8080 check resolvers docker init-addr libc,none

frontend fake_chat
  bind :18081
  default_backend fake_chat

backend fake_chat
  server fixture fake-chat:8080 check resolvers docker init-addr libc,none

frontend fake_tool_broker
  bind :18082
  default_backend fake_tool_broker

backend fake_tool_broker
  server fixture fake-tool-broker:8080 check resolvers docker init-addr libc,none
