global
  log stdout format raw local0
  maxconn 256

defaults
  log global
  mode tcp
  option dontlognull
  timeout connect 3s
  timeout client 1m
  timeout server 1m

resolvers docker
  nameserver embedded 127.0.0.11:53
  resolve_retries 30
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s
  hold nx 1s
  hold other 1s
  hold refused 1s
  hold timeout 1s

frontend control_postgres
  bind :15432
  default_backend control_postgres

backend control_postgres
  server fixture control-postgres:5432 check resolvers docker init-addr libc,none

frontend cell_postgres
  bind :15433
  default_backend cell_postgres

backend cell_postgres
  server fixture cell-postgres:5432 check resolvers docker init-addr libc,none

frontend target_postgres
  bind :15435
  default_backend target_postgres

backend target_postgres
  server fixture target-postgres:5432 check resolvers docker init-addr libc,none

frontend mongo_source
  bind :27017
  default_backend mongo_source

backend mongo_source
  server fixture mongo:27017 check resolvers docker init-addr libc,none

frontend minio_api
  bind :19000
  default_backend minio_api

backend minio_api
  server fixture minio:9000 check resolvers docker init-addr libc,none

frontend minio_console
  bind :19001
  default_backend minio_console

backend minio_console
  server fixture minio:9001 check resolvers docker init-addr libc,none

frontend mailpit_smtp
  bind :11025
  default_backend mailpit_smtp

backend mailpit_smtp
  server fixture mailpit:1025 check resolvers docker init-addr libc,none

frontend mailpit_ui
  bind :18025
  default_backend mailpit_ui

backend mailpit_ui
  server fixture mailpit:8025 check resolvers docker init-addr libc,none
