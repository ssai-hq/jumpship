global
  log stdout format raw local0
  maxconn 128

defaults
  log global
  mode tcp
  option dontlognull
  timeout connect 3s
  timeout client 1m
  timeout server 1m

resolvers docker
  nameserver embedded 127.0.0.11:53
  resolve_retries 30
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s
  hold nx 1s
  hold other 1s
  hold refused 1s
  hold timeout 1s

frontend toxiproxy_api
  bind :18474
  default_backend toxiproxy_api

backend toxiproxy_api
  server fixture toxiproxy:8474 check resolvers docker init-addr libc,none

frontend toxiproxy_data
  bind :18666
  default_backend toxiproxy_data

backend toxiproxy_data
  server fixture toxiproxy:8666 check resolvers docker init-addr libc,none

frontend allowed_egress_fixture
  bind :18083
  default_backend allowed_egress_fixture

backend allowed_egress_fixture
  server fixture allowed-egress-fixture:8080 check resolvers docker init-addr libc,none
