global
  log stdout format raw local0
  maxconn 128

defaults
  log global
  mode tcp
  option dontlognull
  timeout connect 3s
  timeout client 1m
  timeout server 1m

resolvers docker
  nameserver embedded 127.0.0.11:53
  resolve_retries 30
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s
  hold nx 1s
  hold other 1s
  hold refused 1s
  hold timeout 1s

frontend otlp_grpc
  bind :14317
  default_backend otlp_grpc

backend otlp_grpc
  server fixture otel-collector:4317 check resolvers docker init-addr libc,none

frontend otlp_http
  bind :14318
  default_backend otlp_http

backend otlp_http
  server fixture otel-collector:4318 check resolvers docker init-addr libc,none

frontend otel_health
  bind :13133
  default_backend otel_health

backend otel_health
  server fixture otel-collector:13133 check resolvers docker init-addr libc,none
