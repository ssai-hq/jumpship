      "title": "After first render the design brief persists as a click-to-open item in the right-hand panel, docked adjacent to the mapping spec; it re-renders from the current spec version, so it is always the live before/after picture, never a stale screenshot. [fe]"
    },
    {
      "anchor_id": "numbered-list:127:design-brief-summons-when-the-popup-first-arrives",
      "content_sha256": "c9f05cac336ba7ba068a85d285e3a02072ba078498e668cd2c06988b3c6c4c63",
