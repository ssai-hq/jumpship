      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 160,
      "title": "Graded reversibility taxonomy: the reversibility line (#37) upgraded from binary to five classes — free-until-cutover / expensive-after-cutover / closes-on-first-external-exposure / closes-on-a-clock / never-reversible — recorded in the ledger on every decision, auto and human alike. [infra]"
    },
    {
      "anchor_id": "numbered-list:129:reversibility-badge-on-every-decision-card-and-spec",
      "content_sha256": "b7e882f922e9022d55f847c8f7dceb9417af167b7cef5d1d3d8a70f9e2ce4a27",
