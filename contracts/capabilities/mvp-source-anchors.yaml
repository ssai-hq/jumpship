    },
    {
      "anchor_id": "numbered-list:128:graded-reversibility-taxonomy-the-reversibility-line-37-upgraded",
      "content_sha256": "33627db3d1f405db613e01df221992d54ae724dd11a6d8293d367298a6647767",
