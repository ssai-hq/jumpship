      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 44,
      "title": "Golden copy stored in immutable, write-locked, per-customer-encrypted object storage, retained until decommission consent — the \"nothing can ever be lost\" floor and final rollback backstop. (S3 with Object Lock in compliance mode — no one, including Jumpship, can delete before the retention gate — encrypted under the per-customer KMS key; stored as an inert mongodump archive, not a live system.) [infra]"
    },
    {
