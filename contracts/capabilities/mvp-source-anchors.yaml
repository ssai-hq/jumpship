    },
    {
      "anchor_id": "addendum:techstack-jumpship-backend-on-the-aws-customer-migration-data-plane--phase-services-map",
      "content_sha256": "c9870c4d1ce2c35072b4104677e6a22a1c5761be1ce229a0542ef1b0e756ac6e",
      "heading_level": 3,
      "heading_path": [
