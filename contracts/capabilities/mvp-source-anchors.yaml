      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 143,
      "title": "Bounded warranty scope, stated explicitly in-product: Jumpship owns parity attestation, migration-created DB health, regression detection, and offboarding — not the app rewrite, general APM, or becoming the customer's ops team. [fe]"
