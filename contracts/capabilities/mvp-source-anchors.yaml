  "anchors": [
    {
      "anchor_id": "numbered-list:1:tiered-access-manifest-every-grant-jumpship-requests-is",
      "content_sha256": "2adb41c7eb64697956597085010b3b8e8da80667ff1fcc9c14d13ca9684b45a5",
      "display": "1",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 18,
      "title": "Tiered access manifest — every grant Jumpship requests is classified (required / strongly recommended / optional), mapped to the exact pipeline stage that uses it, and annotated with what degrades without it; nothing is requested that isn't traceable to a stage. [infra]"
    },
    {
      "anchor_id": "numbered-list:1a:sign-in-with-github-sign-in-with-google",
      "content_sha256": "5ce11bcbae244aaf3a4c53c524fb745ba219ce315025eed7ccb8002c5b1269eb",
      "display": "1a",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 19,
      "title": "Sign-in with GitHub / sign-in with Google (OIDC), requesting identity-only scopes (name, verified email, avatar) — never repo or mailbox scopes at login; identity and integration grants are deliberately separate OAuth moments, so the first screen is never a permissions wall. [fe]"
    },
    {
      "anchor_id": "numbered-list:1b:login-identity-pre-seeds-the-connect-flow-google",
      "content_sha256": "f422ed68b5368cc0bf11999f0921d1b9daecd78516756215c5091743e6a47766",
      "display": "1b",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 20,
      "title": "Login identity pre-seeds the connect flow: Google sign-in yields the verified email address that becomes the default digest/approval-summons destination (no Gmail access needed or wanted — #10 stays outbound-only); GitHub sign-in pins the user identity so the later GitHub App install is a one-click continuation instead of a second login. [infra]"
    },
    {
      "anchor_id": "numbered-list:1c:workspace-team-model-a-migration-belongs-to-a",
      "content_sha256": "49ac2452920128ced628fb40a5a41e356ab69701fa7df8d71444f332df9e9155",
      "display": "1c",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 21,
      "title": "Workspace/team model: a migration belongs to a workspace, not a person — teammate invites, roles aligned to card routing (engineer for data semantics, revenue owner for business rulings), delegation of interrogation cards, and named-approver designation all hang off workspace membership. [infra]"
    },
    {
      "anchor_id": "numbered-list:1d:step-up-re-authentication-at-the-two-consent",
      "content_sha256": "8532f8cb95c72116398bbb95cfde24ae87a90b77341aa7bb9e302137ac7355e0",
      "display": "1d",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 22,
      "title": "Step-up re-authentication at the two consent gates (cutover flip, decommission): fresh credential + MFA challenge inside the authenticated console session, bound to the ledgered named approver — session cookies alone can never flip a database. [infra]"
    },
    {
      "anchor_id": "numbered-list:2:connect-screen-as-a-staged-flow-not-an",
      "content_sha256": "c2003d93cff92bf2effdbe80bb8d6dbc99f23d26d805baac207403d5fa392944",
      "display": "2",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 23,
      "title": "Connect screen as a staged flow, not an exhaustive grant wall: step 1 shows exactly three mandatory connections (source MongoDB, target Supabase, GitHub) and nothing else; every further connector is deferred until Jumpship has scanned the repo and can ask for it by name, with evidence. Per-grant one-line \"used for\", live status (connected / degraded / missing), and a single screenshot-able security statement for the CTO's diligence. [fe]"
    },
    {
      "anchor_id": "numbered-list:3:mongodb-connection-string-intake-with-helper-guidance-for",
      "content_sha256": "a64a2b161da54834f59d1153f866fa7c50d3c8a24990b6605f705dfbfd8e5960",
      "display": "3",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 24,
      "title": "MongoDB connection-string intake with helper guidance for users who don't know where to find their URI (links, walkthrough); optional Atlas service-account grant (OAuth2 client-credentials against the Atlas Admin API) that unlocks provider backup/snapshot access for the snapshot capability ladder — offered inline, skippable, with the degradation stated. [fe]"
    },
    {
      "anchor_id": "numbered-list:4:supabase-connect-via-a-published-supabase-oauth-integration",
      "content_sha256": "dfc8d0f371523dbd28cee03a3f7ec38097344e63b43566a52f50c77e93145b9e",
      "display": "4",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 25,
      "title": "Supabase connect via a published Supabase OAuth integration: one \"Connect Supabase\" click → org/project consent screen → Jumpship receives scoped, refreshable Management API tokens and programmatically retrieves the project's API keys and database connection info (and rotates/relinquishes them at offboarding) — admin-level handoff with zero manual key copy-paste. [fe]"
    },
    {
      "anchor_id": "numbered-list:4a:post-connect-target-verification-immediately-after-the-supabase",
      "content_sha256": "347d413a4134683f5827301a4895fe759f857e410c1385c7f5788b168b1197ed",
      "display": "4a",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 26,
      "title": "Post-connect target verification: immediately after the Supabase grant, Jumpship confirms what it actually got (project ref, plan, region, privilege ceiling) and renders it back — the grant is proven, not assumed. [infra]"
    },
    {
      "anchor_id": "numbered-list:5:source-credentials-are-read-only-by-construction-jumpship",
      "content_sha256": "b9dca1315559e95a6bce9e917160fe2a141016c6e37bda55e3ec123823773db4",
      "display": "5",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 27,
      "title": "Source credentials are read-only by construction — Jumpship structurally cannot write to the source database. [infra]"
    },
    {
      "anchor_id": "numbered-list:6:credential-custody-encrypted-at-rest-held-only-for",
      "content_sha256": "9d07d95650457ef1dc584054afddd5a3c63e612f45fcbdddeeccfa0c944da45e",
      "display": "6",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 28,
      "title": "Credential custody: encrypted at rest, held only for the engagement, deleted at the end with a deletion attestation included in the final report. (AWS Secrets Manager under the per-customer KMS key; the key's scheduled deletion at decommission is what makes the attestation a cryptographic fact.) [infra]"
    },
    {
      "anchor_id": "numbered-list:7:single-tenant-isolated-worker-per-migration-customer-data",
      "content_sha256": "721d17b50050421b9f6d77bb60155d3624ab5a02fab123e1fcafd7467e068bd7",
      "display": "7",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 29,
      "title": "Single-tenant isolated worker per migration; customer data never enters the control plane — only hashes, counts, specs, and decisions cross that boundary. (One ephemeral AMI-baked EC2 worker per migration in its own VPC with egress-restricted security groups; IAM instance role scoped to this customer's S3 prefix and KMS key only — cross-tenant access structurally impossible, not policy-promised.) [infra]"
    },
    {
      "anchor_id": "numbered-list:8:github-connect-as-a-github-app-installation-not",
      "content_sha256": "3f80ce9f45fbf901db543ef672baa66aa32d034db8a28d872443b996e1052a15",
      "display": "8",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 30,
      "title": "GitHub connect as a GitHub App installation (not raw OAuth): read-only contents + metadata permissions, GitHub's native install-time repo picker (selected repos or whole org), short-lived installation tokens — powering code archaeology and shadow-read corpus capture. [infra]"
    },
    {
      "anchor_id": "numbered-list:9:chat-integration-e-g-slack-bot-that-both",
      "content_sha256": "01410848111f0c2196325960be70736aa5d53cf11bde67f4cc5577ae050e6367",
      "display": "9",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 31,
      "title": "Chat integration (e.g., Slack bot) that both delivers (cards, alerts, digests, cutover choreography) and reads replies/answers in-channel; installed via Slack OAuth v2 with minimal bot scopes (post + read history only in channels it's invited to), never workspace-wide read. [infra]"
    },
    {
      "anchor_id": "numbered-list:10:email-integration-for-notifications-reminders-digests-and-approval",
      "content_sha256": "950e9fd4aaf1c9d4bccca59263cca5c36e14126814ff1a2bb26e14ee64f7c176",
      "display": "10",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 32,
      "title": "Email integration for notifications, reminders, digests, and approval summons — outbound only, never reading the customer's inbox. (Amazon SES.) [infra]"
    },
    {
      "anchor_id": "numbered-list:11:observability-integrations-datadog-honeycomb-sentry-class-for-writer",
      "content_sha256": "193fccc2501cb539fa2521c6e0edee7bf1aabf7021fe27b1a951a7be3e20638e",
      "display": "11",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 33,
      "title": "Observability integrations (Datadog, Honeycomb, Sentry class) for writer cross-checks, log-pattern watch, and incident correlation. [infra]"
    },
    {
      "anchor_id": "numbered-list:12:on-call-uptime-integrations-pagerduty-opsgenie-class-so",
      "content_sha256": "81bd7d204440708852cd6040e10c3b172b5e7e5780ea7e674e34079f5c381569",
      "display": "12",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 34,
      "title": "On-call/uptime integrations (PagerDuty, Opsgenie class) so cutover-night status and incident briefs land where humans already are. [infra]"
    },
    {
      "anchor_id": "numbered-list:13:connector-need-detection-once-the-mandatory-three-are",
      "content_sha256": "49cae41999a6e32e63dbdd9c003d1d3fd0abf806e1510caca5930a74feba5b5e",
      "display": "13",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 35,
      "title": "Connector-need detection: once the mandatory three are live, scan the selected repo(s) and observed DB traffic for integration fingerprints (observability SDKs/agents, on-call config, CI, queue clients) to determine which additional connectors *this* customer's migration will actually use — recommendations are evidence-derived, never a generic catalog. [agent]"
    },
    {
      "anchor_id": "numbered-list:13a:connector-recommendation-cards-each-detected-integration-becomes-a",
      "content_sha256": "dfb89751d326230c1a47fdf23c18a02def6920dd931236d466e523ad4feaa081",
      "display": "13a",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 36,
      "title": "Connector recommendation cards: each detected integration becomes a card citing its evidence (\"Sentry SDK in package.json\", \"Datadog agent in docker-compose\"), the pipeline stage it powers, what degrades without it, and a one-click connect using that service's native grant flow (Datadog OAuth2 integration, Sentry OAuth/integration token, PagerDuty OAuth app). [fe]"
    },
    {
      "anchor_id": "numbered-list:13b:guarantee-coverage-meter-a-single-meter-on-the",
      "content_sha256": "1dfd7cc760d074f06df35018ce78e822c04fdcf31254e1df23a94691884ae867",
      "display": "13b",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 37,
      "title": "Guarantee-coverage meter: a single meter on the connect screen that fills as connectors are granted — each grant shows its increment and the named guarantee surface it strengthens (writer-census confidence, incident triage speed, deploy-config audit reach); honest by construction: the meter maps to real degradations from the access manifest, never a vanity score, and the mandatory three alone still yield a complete migration. [fe]"
    },
    {
      "anchor_id": "numbered-list:13c:optional-but-recommended-channels-slack-email-presented-as",
      "content_sha256": "f87eb1c01aa46a7675c4bc5086430cb9857e668c91da344a8746103bfa13d5cb",
      "display": "13c",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
