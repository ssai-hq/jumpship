      "title": "Transfer-cost honesty: when source and target live on different clouds or regions and egress physics can't be optimized away, the readiness report quotes the expected data-transfer line-item with its cause — the same pre-registered honesty as the freeze-drain estimate. [agent]"
    },
    {
      "anchor_id": "numbered-list:124:session-timeline-execution-surface-attempt-shaped-runs-rehearsal",
      "content_sha256": "59a4356135fa90275875d102aa94e94f3c85af408cf26f06b2c89696253f6fa1",
      "display": "124",
      "kind": "numbered-list",
      "occurrence": 2,
      "occurrence_count": 4,
      "source_line": 152,
      "title": "Session-timeline execution surface: attempt-shaped runs (rehearsal loads, snapshot restore/self-proof, verification passes, kill-tests) render as inline live widgets in the main session — the agent narrates in text, then the widget mounts below it streaming live state (progress, quarantine counts, throughput). [fe]"
    },
    {
      "anchor_id": "numbered-list:125:attempt-lifecycle-in-the-timeline-on-failure-the",
      "content_sha256": "5fa9a9d47a16edd2bcb25ddcb3f2bc3a0bb286ae4ad0c91416e0092dbdd77b09",
      "display": "125",
      "kind": "numbered-list",
      "occurrence": 2,
      "occurrence_count": 3,
      "source_line": 153,
      "title": "Attempt lifecycle in the timeline: on failure the live widget freezes at its final state and collapses into a minimized, darkened stub with a one-line epitaph (\"Attempt 1 — failed: 41K orphan rows quarantined · 14 min\"), expandable via dropdown for the post-mortem; failure reason and retry narration follow in text, and a fresh widget mounts for the next attempt — the stacked stubs read as a burn-down narrative and are the decision/repair ledger rendered visually. [fe]"
    },
    {
      "anchor_id": "numbered-list:126:pinned-sync-widget-the-sync-health-dashboard-83",
      "content_sha256": "2ca1bdf519890a3638faef5b8100587e5a0a131c8549238f8556dfeeebf39d0e",
      "display": "126",
      "kind": "numbered-list",
      "occurrence": 2,
      "occurrence_count": 3,
      "source_line": 154,
      "title": "Pinned sync widget: the sync health dashboard (#83) is deliberately not attempt-shaped — once CDC starts it docks into a persistent pinned slot (sticky header/side panel) that cannot be scrolled away or buried by later session activity, showing degradation health states (lag spike, dead-letter growth) rather than pass/fail, and stays docked until cutover. [fe]"
    },
    {
      "anchor_id": "numbered-list:124:gated-approve-on-every-decision-card-the-approve",
      "content_sha256": "c351b0847de4900a14f183241c6818c7e40ab6ce2e7192ff68ce75e82153d88f",
      "display": "124",
      "kind": "numbered-list",
      "occurrence": 3,
      "occurrence_count": 4,
      "source_line": 155,
      "title": "Gated approve on every decision card: the approve button is disabled while any agent computation is running or any user message in the card is unresolved, and enables itself only when every consequence panel is current and every thread is settled — approval is always of a fully-rendered, stable state; reject/override/postpone remain available at all times. [fe]"
    },
    {
      "anchor_id": "numbered-list:124:design-brief-popup-when-phase-1-synthesis-completes",
      "content_sha256": "99dfb9aae66cbc8ce07fdb9f090ce0b918f1f29f9b63c110a9825453bf1343b7",
      "display": "124",
      "kind": "numbered-list",
      "occurrence": 4,
      "occurrence_count": 4,
      "source_line": 156,
      "title": "Design brief popup — when Phase-1 synthesis completes, a popup renders the migration's before/after in one glance: source shape (collections, embedded subtrees, candidate FK edges from the census) beside target design (tables, FK graph, dial positions), explained in a few sparse sentences; visual first, text minimal; every element in the picture is a deep link — a table opens its spec lines and dial widget, an FK edge opens the census evidence or ruling that proposed it — so a wrong edge is one click from the decision that created it (the brief stays a viewer, never an editor). [fe]"
    },
    {
      "anchor_id": "numbered-list:125:design-brief-first-render-carries-the-design-confirm",
      "content_sha256": "e04050296fc1181d5946ae481be8a6f72d96cf173bf56eb79b041dc657a2bcdb",
