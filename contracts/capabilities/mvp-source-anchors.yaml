      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 3,
      "source_line": 150,
      "title": "Target region as a day-1 decision card: target platforms fix a project's region permanently at creation, so region choice is surfaced as an early interrogation card with computed consequences (latency to app servers, transfer cost, freeze-drain impact) and a recommended ruling — never an irreversible default discovered at cutover. [agent]"
    },
    {
      "anchor_id": "numbered-list:126:transfer-cost-honesty-when-source-and-target-live",
      "content_sha256": "57d145a7ff2be1b36ac0a2ffd8e606c4f17953a717dc38afd2c93c26ba82087a",
