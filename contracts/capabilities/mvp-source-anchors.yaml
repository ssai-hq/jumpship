      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 161,
      "title": "Reversibility badge on every decision card and spec line: one consistent visual grammar for the five classes (color + door iconography), so the user learns the reversibility *topology* of the migration — a wall of one-way doors at target creation, a valley of cheap iteration, a second wall at cutover — not just per-card facts. [fe]"
    },
    {
      "anchor_id": "numbered-list:130:foundation-decisions-packet-the-one-way-doors-set",
      "content_sha256": "20d3a8b605f50067ac1ccaaed4e9df50cab1715ec7fc9af44d3c5442d441bbae",
      "display": "130",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 162,
      "title": "Foundation-decisions packet: the one-way doors set at target creation (target platform, region, Postgres major version, cluster collation/encoding/locale, primary-key exposure strategy) isolated into a distinct day-1 interrogation packet that must be fully answered before any target resource is created. [agent]"
    },
    {
      "anchor_id": "numbered-list:131:foundation-decisions-exception-to-the-assumption-rule-on",
      "content_sha256": "f8d34ca11f8c502608157ecde4a0190b9fae6e37e466045136c5e4359f20f254",
      "display": "131",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 163,
      "title": "Foundation-decisions exception to the assumption rule: on foundation cards only, \"I don't know\" (#30) cannot convert to a ledgered assumption — because the assumption would not be reversible — so the packet fails closed until a human answers; the prime directive's reversible-assumption escape hatch (#122) is structurally unavailable here. [agent]"
    },
    {
      "anchor_id": "numbered-list:132:foundation-decisions-screen-a-dedicated-full-evidence-surface",
      "content_sha256": "7ee92e35d7092bf58d5d640b5e276037c03733c0c1a14ee7d3ea46d33b5324f2",
      "display": "132",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 164,
      "title": "Foundation-decisions screen: a dedicated full-evidence surface (consent-gate-grade, not a modal) where every one-way door arrives pre-set to Jumpship's recommended option — region pre-set from the placement solver (#140), collation pre-set from the query corpus, PK strategy pre-set from the exposure scan — with the full option set beside it, each option carrying its computed consequences (collation → case-sensitivity/ordering semantics against the captured query corpus, region → transfer cost/latency/freeze-drain deltas, PK strategy → external-exposure blast radius) and explicit \"cannot be changed later without a re-migration\" copy; confirming the recommendation is one click, overriding to any alternative is the same click. [fe]"
    },
    {
      "anchor_id": "numbered-list:133:reversibility-timeline-a-live-lifecycle-visualization-of-the",
      "content_sha256": "7cbcf3b53a98b971c4824603e73a673656d11d728c5d4d18a8aad3d897326ab9",
      "display": "133",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 165,
      "title": "Reversibility timeline: a live lifecycle visualization of the doors — which are already closed, which are open, which closes next and what closes it (a decision, an exposure, or a clock) — updated as the migration proceeds; the valley between the two walls is where the product tells the user to iterate freely. [fe]"
    },
    {
      "anchor_id": "numbered-list:134:external-exposure-detector-repo-and-traffic-scan-flags",
      "content_sha256": "791f0a5ad7f9427c2d708abc2f350245488874eb5b4694b513a6936f6d11ee29",
      "display": "134",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 166,
      "title": "External-exposure detector: repo and traffic scan flags when target-generated values (new IDs, sequence values) are about to leak to external parties (URLs, webhooks, emails, partner APIs); first exposure flips the affected decision's reversibility class to closed in the ledger, with a pre-exposure warning card. [infra]"
    },
    {
      "anchor_id": "numbered-list:135:clock-bound-doors-as-countdowns-oplog-retention-headroom",
      "content_sha256": "1c2155834bba1015737e2c31863d0a7ddccb0916dc46c373b7bca5307c922d02",
      "display": "135",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 167,
      "title": "Clock-bound doors as countdowns: oplog retention headroom, reverse-sync window expiry, and consent deadlines rendered as always-visible countdown chips with paging thresholds — irreversibility-by-neglect made impossible to miss. [fe]"
    },
    {
      "anchor_id": "numbered-list:136:rollback-viability-watch-during-the-reverse-sync-and",
      "content_sha256": "5262a23ecc89ffc220d858d8aa9b4b7b91cc9c541f02f4761613002efe0eaef0",
      "display": "136",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 168,
      "title": "Rollback-viability watch: during the reverse-sync and watch periods, detect app-side one-way commitments (Mongo driver paths deleted from the repo, PG-only features or columns in live use) and downgrade the ledgered rollback status accordingly — notifying before, not after, rollback silently stops being real. [infra]"
    },
    {
      "anchor_id": "numbered-list:137:billing-ratchet-warnings-any-platform-action-with-irreversible",
      "content_sha256": "1597ad6086ebb6c44e76daddbe7a12376e72c87ea0c472478c2730961ff1cf71",
      "display": "137",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 169,
      "title": "Billing-ratchet warnings: any platform action with irreversible cost consequences (disk autoscale ratchets, compute-tier floors) badged with the projected permanent monthly delta before execution, sourced from the platform capability profile's ratchet knowledge (#69). [fe]"
    },
    {
      "anchor_id": "numbered-list:138:recommended-default-pattern-enforced-product-wide-jumpship-never",
      "content_sha256": "cd85d528c2102d3f5f20af6a2a4aa5d03e0e35ccfe7d8b38719bf11922041e86",
      "display": "138",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 170,
      "title": "Recommended-default pattern enforced product-wide: Jumpship never presents an open question when it can compute a ranked recommendation — every card (interrogation, quarantine ruling, dial position, foundation decision) arrives pre-set to the recommended option with the alternatives, their computed consequences, and the recommendation's stated basis alongside; confirm and override are equal-weight actions, and the ledger records which was taken. [agent]"
    },
    {
      "anchor_id": "numbered-list:139:recommendation-basis-disclosure-every-recommendation-names-what-it",
      "content_sha256": "65b837824099345edb8e8fe09d14887000cf27cebe7de53da8c241b395a815b8",
      "display": "139",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 171,
      "title": "Recommendation-basis disclosure: every recommendation names what it optimizes (customer cost, latency, drain time, risk) — and where Jumpship's own operating cost is a factor in the ranking (e.g., worker co-location reducing transfer fees), that interest is disclosed on the card rather than hidden; recommendations must be defensible as best-for-the-customer first, with any alignment of interests stated as exactly that. [fe]"
    },
    {
      "anchor_id": "numbered-list:140:region-placement-solver-given-the-detected-source-region",
      "content_sha256": "f077d3514a05ca609a9db983c7a793a758d648fca81f7b93847905355d2166ce",
      "display": "140",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 172,
      "title": "Region placement solver: given the detected source region, the app's deploy region(s) (from repo/deploy config), and the target platform's available-region list, compute the placement triple — recommended target region (= the app's region: post-cutover latency is forever, migration cost is weeks), worker region (= target region: the heavy repeated flows are bulk/rehearsal loads and both-direction verification reads, while source-side verification hits the worker's local replica, and only the one-time dump plus the skinny CDC tail pay cross-region), and golden-bucket region (= worker region: the dump crosses once, restores recur per rehearsal) — with per-option transfer-cost and latency estimates feeding the foundation card (#132); the control plane's own region is irrelevant by construction since only hashes/specs/decisions cross that boundary, so the data plane deploys to whatever region the solver picks. [infra]"
    },
    {
      "anchor_id": "numbered-list:141:private-connectivity-ladder-the-platform-capability-profile-69",
      "content_sha256": "a1f7fc0aaa409b9f0922d96d8f0a2d3309d0a951048ec5a1aebd60071d755699",
      "display": "141",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 173,
      "title": "Private-connectivity ladder: the platform capability profile (#69) records each source/target platform's best available network rung — VPC-peering-class private link / private-endpoint service / public TLS only — and the worker connects at the highest rung the customer's plan allows, with the chosen rung and its data-path fact (\"stays on the cloud backbone / never crosses the public internet\") rendered on the connect screen as part of the security statement (#2); where the placement solver (#140) cannot eliminate a cross-cloud leg (source hosted on a different cloud than every available target region), that leg's per-GB transfer cost is computed and disclosed up front — it lands on the customer's own source-platform bill, so it is quoted in the readiness report rather than discovered on an invoice. [infra]"
    },
    {
      "anchor_id": "numbered-list:142:agent-as-conductor-one-jumpship-agent-orchestrates-the",
      "content_sha256": "0374b79b72b5abf9a04c519c28c11727977f854645a0e021affdc29f8ef6bf62",
      "display": "142",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 182,
      "title": "Agent-as-conductor: one Jumpship agent orchestrates the entire engagement end to end — sequences the phases, reacts to alarms, census diffs, and triage signals, decides when to snapshot, rehearse, re-verify, and escalate, and composes the temporary migration infrastructure per engagement (worker sizing from the fan-out projection, source replica flavor, change-feed tailer, drivers, disk). Everything else in this list is a tool the agent invokes, not a peer process; the customer is hiring the agent, and the agent uses power tools the way a human migration engineer runs a dump utility rather than copying rows by hand. [agent]"
    },
    {
      "anchor_id": "numbered-list:143:deterministic-within-call-semantics-every-data-touching-tool",
      "content_sha256": "1fdf20c8d831b845f86b0e87849b5cabc3585e3d67d85aa2812c75ace4db4ee8",
      "display": "143",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 184,
      "title": "Deterministic within-call semantics: every data-touching tool the agent invokes (transform, load, CDC apply, verify) executes mechanically from versioned artifacts. The agent has full authorship of the mapping spec `f` — it writes it, revises it after every ruling, decides when to re-run it — and zero per-record improvisation, because the guarantee `target = f(source)` only means something if `f` is a fixed, inspectable artifact: kill-test resume (#67), golden-corpus byte-identity (#74), and reverse-transform verification (#91) all depend on it. Judgment writes the law; the law executes mechanically. [infra]"
    },
    {
      "anchor_id": "numbered-list:144:the-constitution-harness-gates-bind-the-agent-itself",
      "content_sha256": "28f527c48be10a65c697cbda0c0a62a8968cf38f826d307ee86ef1fc9c63f9f9",
      "display": "144",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 186,
      "title": "The constitution: harness gates bind the agent itself. The agent is structurally incapable of flipping cutover, writing to the source, deleting the golden snapshot, releasing credentials, or bypassing consent and quarantine gates — the same way source credentials are read-only by construction (#5). The incapability list is explicit and customer-visible, because it is precisely what makes granting the agent full autonomy safe to say yes to: \"full autonomy, and here is the short list of things it architecturally cannot do without your typed consent.\" [infra]"
    },
    {
      "anchor_id": "numbered-list:145:source-target-generality-via-capability-contracts-every-source",
      "content_sha256": "9ad123fe4ed18e2ccf171459f5121d5aff53613a3726e047e752f9d8b2537b57",
      "display": "145",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 188,
      "title": "Source/target generality via capability contracts: every source must yield {a consistent point-in-time snapshot method, a change feed, a consistency token}; every target must yield {a bulk load path, staged constraints, a rehearsal mechanism}. The agent satisfies the contract from whatever the platform actually offers — the snapshot capability ladder (#15) is the template — and where a platform cannot meet a clause, Jumpship degrades honestly (freeze-window instead of CDC, disposable instances instead of copy-on-write branches) or declines. The product is the guarantee applied to a pair, not a Mongo→Postgres tool. [agent]"
    },
    {
      "anchor_id": "numbered-list:146:worker-as-generic-substrate-the-per-migration-worker",
      "content_sha256": "b8b164e781f0a5e2be2b88292ff10873f72409d273d20c20648b4751f82c2b6b",
      "display": "146",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 190,
      "title": "Worker as generic substrate: the per-migration worker is a neutral, isolated, single-tenant sandbox — compute, disk, immutable custody, audit — with no source or target assumptions baked in. What runs on it is composed by the agent per engagement under the capability contract; the provisioning primitives themselves stay deterministic tools (\"a worker in region X with Y TB\"). [infra]"
    },
    {
      "anchor_id": "numbered-list:147:new-pair-economics-as-operational-memory-extends-42",
      "content_sha256": "74c7c916c9f6e9466cd46645fa2e6e3f5d912ca4206fe4f56797b64c5dcafe62",
      "display": "147",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 192,
      "title": "New-pair economics as operational memory (extends #42/#69): the first migration on a new source→target pair runs agent-heavy — more discovery, more interrogation, more HITL — and is priced accordingly; everything learned accretes into the platform capability profiles, so later migrations on that pair are mostly profile-driven with the agent handling the residual. The agent is how Jumpship reaches a new pair without an engineering sprint; the profiles are how it never re-learns one. [agent]"
    },
    {
      "anchor_id": "numbered-list:148:guarantee-tier-discipline-a-pair-whose-verification-cannot",
      "content_sha256": "3164f34737721aa5d4971f36fcb345be3e04c4a021303d99b196f6534e3d3350",
      "display": "148",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 194,
      "title": "Guarantee-tier discipline: a pair whose verification cannot yet meet the full pyramid standard (#89–#95, including a per-pair canonical form and reverse transform) is sold as rehearsal-only/beta, never with the signed integrity report — the certificate must mean exactly the same thing on every pair, because the certificate is the brand. [infra]"
    },
    {
      "anchor_id": "numbered-list:149:three-part-topology-mothership-deterministic-deployment-and-supervision",
      "content_sha256": "a128be778ee5a08cb198a0d493daa6d1f6945bd1f38c3c98265371d3b592146e",
      "display": "149",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 206,
      "title": "Three-part topology: **mothership** = deterministic deployment and supervision of customer agent cells; **Jumpship backend** = deterministic migration product and data-plane machinery; **migration cell** = one customer's isolated worker plus conductor agent and customer-purposed runtime resources. The cell agent has unrestricted read only inside its cell and structurally zero reach into another cell or the mothership's deployment authority. [infra]"
    },
    {
      "anchor_id": "numbered-list:150:mothership-scope-deliberately-narrow-maintain-the-cell-template",
      "content_sha256": "19755bd825c8839812e482adea766f7e367a607081f5bd6daffec0bc310752df",
      "display": "150",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 207,
      "title": "Mothership scope, deliberately narrow: maintain the cell template and deployment registry; allocate a customer/cell identity; create or attach the cell's compute, network boundary, runtime IAM role, KMS key, secrets namespace, and storage namespace; inject a signed bootstrap manifest; start/restart the agent harness; observe liveness; revoke the runtime identity; and terminate the cell when the Jumpship backend authorizes teardown. It does not snapshot, tail CDC, load rows, verify parity, decide migration phases, render cards, page on migration semantics, or own the engagement ledger. [infra]"
    },
    {
      "anchor_id": "numbered-list:151:mothership-iam-authority-without-standing-keys-the-mothership",
      "content_sha256": "3b044a2db042a2a440dc78026348c792942f7eb0e394843702b6ab98f9a09760",
      "display": "151",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 208,
      "title": "Mothership IAM authority without standing keys: the mothership owns the AWS deployment authority needed to mint per-cell roles and resources, but uses a workload identity / short-lived role assumption rather than a long-lived IAM access key. Its deployer role can create only resources carrying a signed `cell_id` and approved template boundary; it cannot read customer secrets, decrypt customer data, assume the cell runtime role, or invoke source/target data operations. The per-cell KMS administration path and the cell's decrypt/use path are separate policies. [infra]"
    },
    {
      "anchor_id": "numbered-list:152:jumpship-backend-ownership-snapshot-and-golden-copy-custody",
      "content_sha256": "bca101a029be602c16350776f75f71c707ca4d15a19dee0fae673b6a328f7b8f",
      "display": "152",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 209,
      "title": "Jumpship backend ownership: snapshot and golden-copy custody (#15–19), census (#20–24), transform compilation and loading (#54–74), CDC (#75–85), verification (#86–96), artifacts and ledgers, connector workflows, phase state, consent gates (#104–108), cutover choreography, reverse sync, watch, and deletion attestation (#120–121) belong to the Jumpship backend. They may execute on customer-purposed AWS resources provisioned by the mothership, but provisioning location does not transfer product ownership to the mothership. [infra]"
    },
    {
      "anchor_id": "numbered-list:153:corridor-architecture-split-the-backend-owns-the-source",
      "content_sha256": "8b03cee6609a917138fe07b99b167458fb0fc53135d1e1788f808d4cdafda1be",
      "display": "153",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 210,
      "title": "Corridor architecture split: the backend owns the source/target capability contracts and migration corridor profiles — Atlas→Supabase, Firebase→Supabase, VPS-Mongo→Neon, sharded→Aurora, and so on — including snapshot/change-feed/load/verification adapters, platform scar tissue, phase rules, and connector needs. The mothership receives only a compiled **cell deployment manifest** from the backend: region, worker class, disk, network endpoints, required runtime components, and policy template version. It provisions that manifest without interpreting database semantics. [infra]"
    },
    {
      "anchor_id": "numbered-list:154:two-constitutions-enforced-at-the-correct-layer-the",
      "content_sha256": "7440df048ccc230a3daf25f14c256153884ef0d4da7adeec2a5fe1e6d21781ba",
      "display": "154",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 211,
      "title": "Two constitutions, enforced at the correct layer: the mothership constitution prevents cross-cell access, privilege escalation, deployment-template escape, and agent self-replication; the Jumpship backend constitution prevents source writes, per-record LLM improvisation, unresolved-quarantine progression, unverified cutover, consent bypass, premature snapshot deletion, and invalid credential lifecycle transitions. The cell agent can author recommendations and mapping specs but cannot amend either constitution. [infra]"
    },
    {
      "anchor_id": "numbered-list:155:supervision-split-the-mothership-watches-infrastructure-facts-only",
      "content_sha256": "0a1b8d64db8be10c0b7653f6e275ab885e1234d476ebbd203e7e07fa5ae66b37",
      "display": "155",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 212,
      "title": "Supervision split: the mothership watches infrastructure facts only — cell boot, agent-process heartbeat, instance health, bootstrap version, restart budget, and identity expiry — and deterministically restarts the cell or pages the Jumpship backend when those fail. The backend watches migration facts — oplog headroom, CDC lag, quarantine, verification, writers, phase stalls, approval deadlines — and decides whether to invoke a backend recovery tool, ask the agent to diagnose, or page a human. A dead agent is relaunched by the mothership and re-briefed from a backend-issued, signed checkpoint; the agent never supervises itself. [infra]"
    },
    {
      "anchor_id": "numbered-list:156:boundary-traffic-mothership-cell-carries-only-deployment-material",
      "content_sha256": "ff1c88143892a1109c7e72a5594430e261d128323ab41d1d8ffa8fb707b17904",
      "display": "156",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 213,
      "title": "Boundary traffic: **mothership ↔ cell** carries only deployment material and infrastructure health (signed bootstrap manifest down; heartbeat and attested runtime identity up). **backend ↔ cell** carries capability-scoped commands and permitted artifacts (specs, card outcomes, quarantine signatures, rubric results, health metrics, ledgered decisions), never raw customer records into the shared control plane. Bulk customer data remains inside customer-purposed cell resources. This keeps prompt-injection blast radius equal to the cell runtime role and prevents the mothership's deployment authority from becoming a customer-data access path. [infra]"
    },
    {
      "anchor_id": "numbered-list:157:efficient-mvp-and-evolution-begin-with-a-small",
      "content_sha256": "e77cb4e2b5552f1eed66c836ca3d266aaaf0ec0cc9e3210fb3d2c83ec0848318",
      "display": "157",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 214,
      "title": "Efficient MVP and evolution: begin with a small Terraform/OpenTofu module plus a thin cell-controller service as the mothership, one versioned Atlas→Supabase backend corridor, and one agent harness image. Build the per-cell IAM/KMS/network boundary and signed bootstrap/checkpoint contract from day one; keep fleet scheduling, autoscaling, multi-region placement automation, and automated corridor-profile curation out until multiple simultaneous cells justify them. The stable seam is `backend compiles deployment manifest → mothership provisions cell → agent invokes backend tools → backend authorizes teardown → mothership destroys cell`. [infra]"
    },
    {
      "anchor_id": "numbered-list:158:aws-residency-is-not-the-authorization-boundary-the",
      "content_sha256": "bc5fe88b14412bc99e635475b9bc9db0ad2bbdc5d67061c550aef66a3c4279a3",
      "display": "158",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 215,
      "title": "AWS residency is not the authorization boundary: the conductor agent runs wholly inside Jumpship's AWS organization, but \"inside our AWS\" never means account-wide discovery or administrator access. Its universe is one migration cell. It may inspect everything relevant to that customer's engagement — replica, samples, repo evidence, quarantine, target, rehearsals, logs, specs, and tool results — while IAM, network, KMS, Secrets Manager, and backend authorization make every other cell, shared control-plane datastore, deployment authority, and audit account invisible and unreachable. [infra]"
    },
    {
      "anchor_id": "numbered-list:159:agent-permission-asymmetry-broad-read-over-cell-local",
      "content_sha256": "8743743a3ae37fb72611328113dcec682ba7cc57d0dd21a4c4087a2b6f7bcc97",
      "display": "159",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 216,
      "title": "Agent permission asymmetry: broad read over cell-local migration evidence; write access only to agent-owned working artifacts and spec proposals; execution through named Jumpship-backend capabilities. The agent has no `iam:*`, policy mutation, role creation, `sts:AssumeRole`, arbitrary KMS grant creation, cross-cell list/read, source-write credential, direct traffic-flip, snapshot-delete, or self-termination permission. Sensitive work follows `agent requests operation → backend validates phase/spec/consent → backend issues a narrow short-lived execution grant to the deterministic tool runtime → result is ledgered → agent interprets it`. [infra]"
    },
    {
      "anchor_id": "numbered-list:160:typed-inventory-instead-of-aws-exploration-the-backend",
      "content_sha256": "5650da7707b2379172f4f867b434b24d7e1fbced120f96c2580b7510c700b50f",
      "display": "160",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 217,
      "title": "Typed inventory instead of AWS exploration: the backend gives the agent a signed cell manifest containing the source, target, corridor/profile versions, permitted evidence locations, available tools, and current phase. The agent does not learn its environment by listing the AWS account (`ListBuckets`, account-wide `DescribeInstances`, `ListSecrets`, etc.); it reasons over the manifest and capability results. This gives it complete migration context without making cloud-resource discovery part of model intelligence. [infra]"
    },
    {
      "anchor_id": "numbered-list:161:production-account-topology-use-aws-organizations-with-separate",
      "content_sha256": "e6d320adf115d505c7295e8aa36ee540e9d83c168ebb33f305d84e24fa182909",
      "display": "161",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 218,
      "title": "Production account topology: use AWS Organizations with separate accounts for (a) mothership deployment authority, (b) Jumpship shared backend/control plane, (c) security/log archive, and, where customer assurance or fleet scale warrants it, (d) one disposable/customer-purposed migration-cell account per engagement. The mothership can bootstrap and close a cell account but cannot decrypt its data; the backend can authorize migration operations but cannot mint its own deployment authority; organization audit trails land in an immutable account neither can modify. Account-per-cell is the strongest isolation end state, not an MVP prerequisite. [infra]"
    },
    {
      "anchor_id": "numbered-list:162:single-account-mvp-containment-early-cells-may-share",
      "content_sha256": "278110141bed477bbb71758a1b9862134999e5e14d7e00a12b60d17b4e5c2691",
      "display": "162",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 219,
      "title": "Single-account MVP containment: early cells may share one Jumpship data-plane AWS account only if each cell has a unique VPC, runtime role, backend-tool role, KMS key, secrets namespace, S3 prefix, mandatory `cell_id` session/resource tags, permission boundaries, explicit cross-cell denies, and cell-scoped VPC endpoint policies. Agent and deterministic tool roles remain separate: the agent decides and requests; the tool role briefly receives only the data permission needed for the approved operation. The interfaces are designed so moving a cell into its own AWS account later changes deployment, not migration semantics. [infra]"
    },
    {
      "anchor_id": "numbered-list:163:model-provider-seam-bedrock-first-production-inference-goes",
      "content_sha256": "39cf9e7c396df37588b6032f904ccd4194426ea1538ea6a4b194352e445c8fce",
      "display": "163",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 220,
      "title": "Model-provider seam, Bedrock first: production inference goes directly through Amazon Bedrock's model-runtime APIs from the cell, authenticated by its IAM role and reached through a VPC endpoint; the harness speaks a small Jumpship-owned provider interface rather than a provider-native message format. Bedrock is the first provider because regional inference, short-lived AWS identity, CloudTrail/CloudWatch legibility, prompt caching, and model-family optionality fit the cell boundary. Public model APIs remain development fallbacks and never receive customer data. [infra]"
    },
    {
      "anchor_id": "numbered-list:164:task-tier-routing-rather-than-one-model-for",
      "content_sha256": "2f269d23f3eb2ec2d827b1382459792f5b85008a5285814acf8da5885fab6eab",
      "display": "164",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 221,
      "title": "Task-tier routing rather than one-model-for-everything: the backend labels each reasoning request by capability and consequence — extraction/summarization/routine classification, ordinary migration reasoning, or high-stakes design/incident analysis — and the provider router selects the cheapest qualified model tier. Escalation to a stronger tier is triggered by an evaluation failure, disagreement, low confidence, or high reversibility cost, not by default. Model names and prices are configuration/profile data; the routing contract is stable. [agent]"
    },
    {
      "anchor_id": "numbered-list:165:four-stores-one-authority-rule-canonical-migration-state",
      "content_sha256": "597f1d0213a06dca7677aaa5469be360f8c49367dccfe15a51c0304e2bab0908",
      "display": "165",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 222,
      "title": "Four stores, one authority rule: canonical migration state (phase, approved spec, consent, verification verdict) lives only in the Jumpship backend; agent execution state (current step, pending operation, retry and wait state) lives in a durable per-cell checkpoint store; agent memory (findings, summaries, hypotheses, diagnoses) lives in the cell memory store; raw evidence lives on cell EBS/S3. Agent memory can assist reasoning but can never override canonical backend truth. [infra]"
    },
    {
      "anchor_id": "numbered-list:166:unified-postgres-memory-substrate-use-ordinary-postgres-in",
      "content_sha256": "0e4a1a4b8c9a9079bb89f808863041dd03de642e62f12288ee367835a0e2e8fd",
      "display": "166",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 223,
      "title": "Unified Postgres memory substrate: use ordinary Postgres in the cell for durable checkpoints, append-only agent events, episodic memory, semantic/procedural memory, provenance, temporal validity, full-text search, and — only where semantic retrieval earns it — `pgvector`. Adopt the useful unified-Postgres pattern validated by Tiger Data, not Agentic Postgres as an all-in-one agent platform: no Tiger Cloud dependency, no arbitrary database MCP, no pgvectorscale/DiskANN, hypertables, BM25 extension, or vectorizer until measured corpus size/query pressure justifies each addition. [infra]"
    },
    {
      "anchor_id": "numbered-list:167:cheapest-durable-deployment-for-the-first-corridors-run",
      "content_sha256": "431de67a7665cd31b969925d478598fe14ccfe08d0a37520b38c9fc7826f5ba8",
      "display": "167",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 224,
      "title": "Cheapest durable deployment: for the first corridors, run the cell Postgres on the worker's already-paid-for encrypted EBS volume and archive WAL/periodic encrypted backups into the cell's KMS-scoped S3 prefix; on worker replacement, the mothership restores the runtime and the backend-signed checkpoint identifies the database/evidence generation to restore. A separate RDS/Aurora instance per migration is deferred until concurrency, recovery SLOs, or enterprise assurance outweigh the per-cell cost. [infra]"
    },
    {
      "anchor_id": "numbered-list:168:explicit-memory-classes-a-read-only-constitutional-memory",
      "content_sha256": "831d7eb124a2082a69afa0c906df874ceb5ac8644d695a1564d680b22ac63093",
      "display": "168",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 225,
      "title": "Explicit memory classes: (a) read-only constitutional memory — role, invariants, corridor/tool contract; (b) canonical active-state projection — current phase/spec/blockers/next door, regenerated from backend truth; (c) working memory — current plan, pending operation, recent observations; (d) append-only episodic memory — observation→reasoning→action→outcome with artifact hashes; (e) semantic/procedural memory — distilled facts and reusable methods. Every durable memory carries `migration_id`, phase, spec/tool version, evidence references, author, confidence, `valid_from`, `valid_until`, and `superseded_by`. [infra]"
    },
    {
      "anchor_id": "numbered-list:169:deterministic-context-compiler-before-every-model-call-backend",
      "content_sha256": "773e1bebda5f745747c17a1f528cc507c322d2be4d1269ce60e3d6f17333c2ec",
      "display": "169",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 226,
      "title": "Deterministic context compiler: before every model call, backend/harness code — not free-form agent retrieval — compiles a budgeted context in this order: cached constitution and corridor contract; canonical active-state projection; current task and acceptance condition; recent interaction/tool slice; exact matching ledger decisions; retrieved valid memories; narrow evidence excerpts. The compiler records the IDs/hashes and token allocation of every included item so a reasoning turn is replayable and auditable. [infra]"
    },
    {
      "anchor_id": "numbered-list:170:retrieval-ladder-exact-identifiers-relational-filters-phase-spec",
      "content_sha256": "b2cff384be1197154f6ecbbd78b78ab249f3e7dc65d283c6d0d94cfdf6b2c854",
      "display": "170",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 227,
      "title": "Retrieval ladder: exact identifiers, relational filters, phase/spec validity, and full-text search precede vector similarity; semantic retrieval is a fallback for fuzzy recall, followed by reranking and an explicit raw-evidence fetch when necessary. Vector similarity can suggest a memory but cannot establish that it is current: invalidated/superseded facts are filtered mechanically, and every returned claim retains provenance to its source artifacts. [infra]"
    },
    {
      "anchor_id": "numbered-list:171:structured-compaction-never-lossy-authority-the-raw-event",
      "content_sha256": "69bc601325ec087390d52fe2fde47ae1464c3151e5f7fb893cec8959409c218b",
      "display": "171",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 228,
      "title": "Structured compaction, never lossy authority: the raw event log is retained; when working history crosses a token/turn threshold, a cheap model tier produces a typed checkpoint summary containing covered event IDs, completed work, unresolved items, hypotheses, decisions, evidence hashes, and next action. Deterministic validation confirms all referenced IDs exist before the summary becomes retrievable. Compaction never rewrites the mapping spec, ledger, approval, verification state, or raw evidence. [infra]"
    },
    {
      "anchor_id": "numbered-list:172:prompt-cache-friendly-context-layout-the-stable-prefix",
      "content_sha256": "c6d193fcf733e77d29d783505e5f339b2155fa5349d8f0766fe45013a9a632b0",
      "display": "172",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 229,
      "title": "Prompt-cache-friendly context layout: the stable prefix (constitution, corridor rules, tool definitions, canonical examples) is versioned and placed before the dynamic suffix so Bedrock prompt caching can reuse it; current state, retrieved memory, and evidence follow. Cache read/write tokens, hit rate, time-to-first-token, and cost per completed agent step are first-class metrics. Cache invalidation is a version bump, never implicit prompt mutation. [infra]"
    },
    {
      "anchor_id": "numbered-list:173:evidence-and-embedding-discipline-large-artifacts-remain-in",
      "content_sha256": "31793c6737ad6d5e40903c29618dceda6a9d6d0966893b68259a5fe9fc052e4f",
      "display": "173",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 230,
      "title": "Evidence and embedding discipline: large artifacts remain in S3/EBS and Postgres stores typed references, hashes, classifications, summaries, and retrieval indexes. Do not embed raw customer rows, whole transcripts, or every tool result by default; embed only stable, distilled units with a demonstrated fuzzy-retrieval use case, asynchronously and idempotently by content hash. This reduces inference/embedding cost, index noise, deletion work, and accidental context leakage. [infra]"
    },
    {
      "anchor_id": "numbered-list:174:agentcore-decision-do-not-use-agentcore-runtime-harness",
      "content_sha256": "c4224e80a9befd4e5abe8047bc9b63ef1904f8fa0c42ec86be6a05ebc601b40b",
      "display": "174",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 231,
      "title": "AgentCore decision: do not use AgentCore Runtime, Harness, or Memory as the MVP's agent substrate. Runtime duplicates the already-required cell worker; managed memory's generic extraction/automatic injection weakens Jumpship's provenance and deterministic-context requirements; Harness would surrender ownership of the loop before its shape is understood. AgentCore components remain individually reconsiderable later (especially governed tool gateway/identity/observability), but none is canonical state and none may widen the cell boundary. [infra]"
    },
    {
      "anchor_id": "numbered-list:175:runtime-framework-decision-deliberately-parked-the-agent-loop",
      "content_sha256": "78e28ea685e4841d58a487834944124a5a722ce8b16fd7c98208194ef9bf106c",
      "display": "175",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 232,
      "title": "Runtime-framework decision deliberately parked: the agent loop requires durable checkpoint/resume, interrupt/wait, streaming, typed state, idempotent tool requests, traceability, and provider neutrality, but no framework is selected or shortlisted here. Candidate runtimes will be evaluated separately against a Jumpship migration trajectory corpus. All decisions #163–174 expose framework-neutral interfaces so this choice cannot force a memory, provider, backend, or data-boundary rewrite. [infra]"
    },
    {
      "anchor_id": "numbered-list:176:cheap-fast-good-operating-method-the-agent-wakes",
      "content_sha256": "e338858d6af5221cadcb30f5c298a0fa728366bd96a6f9d63163b45c9f56e868",
      "display": "176",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 233,
      "title": "Cheap-fast-good operating method: the agent wakes on backend/user/alarm events rather than reasoning continuously; deterministic tool outputs are memoized by artifact hash + tool/spec version; routine consolidation is batched; token-efficient structured tools return summaries plus drill-down handles; the strongest reasoning tier is reserved for consequential judgment; OpenTelemetry traces model/tool steps into cell-scoped CloudWatch with redaction. Optimize against cost and latency per accepted decision, resolved quarantine class, and completed phase — never raw token price or turns alone. [infra]"
    },
    {
      "anchor_id": "numbered-list:177:engine-language-and-dependency-rule-the-deterministic-migration",
      "content_sha256": "cd78c6e88ff4fa292affcd42fe0383419cda078dc23d415f82214aa78050d4b7",
      "display": "177",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 234,
      "title": "Engine language and dependency rule: the deterministic migration engine is Go — matching Jumpship's backend, compiling to one static-ish deployable, and giving direct access to mature MongoDB/Postgres/AWS libraries without Python hot-path overhead or JVM/Kafka operational weight. External components are pinned binaries/OCI layers with checksums and SBOMs; Jumpship owns the orchestration and semantics around them. [infra]"
    },
    {
      "anchor_id": "numbered-list:178:snapshot-implementation-ladder-atlas-dedicated-cluster-migrations-prefer",
      "content_sha256": "4f454eb913b10af42b23d5eb94b10fde1e844b9864a1a3e1529661eefef5733f",
      "display": "178",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 235,
      "title": "Snapshot implementation ladder: Atlas dedicated-cluster migrations prefer Atlas Admin API/official SDK cloud-backup snapshot download or restore; the provider-native snapshot is retained as the golden artifact, restored into worker-side MongoDB, and self-proved. Replica-set fallback uses pinned MongoDB Database Tools (`mongodump --archive --gzip --oplog` + `mongorestore --archive --gzip --oplogReplay`); standalone fallback requires a write freeze. Atlas Extended-JSON-to-S3 export is lower priority than native snapshot download because BSON/storage fidelity is the subject matter. [infra]"
    },
    {
      "anchor_id": "numbered-list:179:mongodb-access-substrate-all-census-batch-cursor-and",
      "content_sha256": "dbabdbc25eca2414102b6189dac0eaa62412e0f89168e0486d056c1c11d2aabe",
      "display": "179",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 236,
      "title": "MongoDB access substrate: all census, batch cursor, and CDC work uses the official Go driver v2 and `bson.Raw` against the worker restore or read-only source. No generic JSON conversion occurs before the mapping compiler sees BSON types. Atlas control operations use the Atlas Admin API/official Go SDK; AWS custody uses AWS SDK for Go v2. [infra]"
    },
    {
      "anchor_id": "numbered-list:180:code-archaeology-toolchain-ripgrep-for-fast-fingerprint-exact",
      "content_sha256": "1adb0ca85889e88361d7b353b6a3f80d7f975b103039952979d5cde01458d712",
      "display": "180",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 237,
      "title": "Code-archaeology toolchain: `ripgrep` for fast fingerprint/exact-symbol discovery, Semgrep for reusable language-aware patterns, and Tree-sitter for custom AST/dataflow extraction where pattern rules stop being honest. These deterministic scanners produce evidence and query/writer candidates; the agent interprets them. An LLM-only repo scan is never the writer/query census. [infra]"
    },
    {
      "anchor_id": "numbered-list:181:mapping-artifact-and-safe-expression-stack-the-signed",
      "content_sha256": "820134685900be24eea593e7fa80e0e12706d0d9773cfe938f95c5fee7a1d2aa",
      "display": "181",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 238,
      "title": "Mapping artifact and safe-expression stack: the signed mapping spec is versioned canonical JSON validated by JSON Schema plus a custom Go compiler that enforces totality and corridor rules. Bounded scalar predicates/coercions use a restricted `cel-expr/cel-go` environment — precompiled, typed, side-effect-free, no clock/random/network/filesystem/database functions. Structural normalization uses Jumpship-owned typed operations (`copy`, `coerce`, `explode_array`, `create_child`, `resolve_reference`, `quarantine`, explicit `drop`), not arbitrary JavaScript/Python. Exact decimal arithmetic uses `cockroachdb/apd`; money never passes through binary float. [infra]"
    },
    {
      "anchor_id": "numbered-list:182:shared-transform-plan-the-compiler-lowers-the-mapping",
      "content_sha256": "9684c864ec2706a653b725d3d82cecef07182ecb888b53f9191410c14bdef4a7",
      "display": "182",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 239,
      "title": "Shared transform plan: the compiler lowers the mapping spec into one versioned typed execution plan consumed by the batch cursor and change-event driver. The plan and compiled CEL programs are immutable/thread-safe and content-addressed; golden-corpus CI proves batch/CDC byte-equivalence. Jumpship owns this compiler and transform library — it is core product IP, not delegated to DMS, an ETL vendor, or generated per-record code. [infra]"
    },
    {
      "anchor_id": "numbered-list:183:target-load-stack-use-jackc-pgx-v5-through",
      "content_sha256": "721d63fb3296936cc34064347dc87b9e8b4678eb3b4a80ae8a222b717018ca6f",
      "display": "183",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 240,
      "title": "Target/load stack: use `jackc/pgx/v5` through the Supabase direct endpoint, with streaming binary `COPY` (`CopyFromSource`) and bounded per-table concurrency from the platform probe. Protocol is bare tables → COPY in FK-topological order → indexes → `ANALYZE` → constraints `NOT VALID` → triage → `VALIDATE`. Pooler transaction mode is forbidden for migration load and replication; `pgx` prepared-statement behavior is explicitly controlled where a pooler is unavoidable. [infra]"
    },
    {
      "anchor_id": "numbered-list:184:identity-map-minimization-preserve-mongo-id-derive-deterministic",
      "content_sha256": "3bf884b169d2ae882037f716b46ba2c1e1cced49b748fee4bc8acd7778cfaef1",
      "display": "184",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 241,
      "title": "Identity-map minimization: preserve `mongo_id`, derive deterministic target identities (UUIDv5-class namespace derivation), and derive child keys from `(parent_mongo_id, structural_path, array_index)` so most migrations require no lookup map. Where a real source→target map remains, use CockroachDB Pebble on encrypted EBS — a production-proven embedded LSM KV with checkpoints/snapshots — never an in-memory map or a network cache. [infra]"
    },
    {
      "anchor_id": "numbered-list:185:rehearsal-adapter-use-supabase-branching-through-its-management",
      "content_sha256": "ad058b335c66114480605fcf51a57596ba6fc4137b1605eec2f23be9b7a1ea18",
      "display": "185",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 242,
      "title": "Rehearsal adapter: use Supabase Branching through its Management API when the project/plan permits; create an isolated branch, wait for health, retrieve scoped credentials, load it explicitly (branches are data-less unless configured otherwise), verify, then delete. Fallback order is disposable Supabase project → customer-authorized disposable Postgres on the actual target platform → worker-local Postgres for early transform testing only. Local Postgres never substitutes for final platform-physics rehearsal. [infra]"
    },
    {
      "anchor_id": "numbered-list:186:native-mongo-cdc-build-a-narrow-go-tailer",
      "content_sha256": "7be8dd932f579b6257f500c0b2e77049ecee29e410430d4f8ef0eb59c105d5c4",
      "display": "186",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 243,
      "title": "Native Mongo CDC: build a narrow Go tailer over official MongoDB change streams with resume/start tokens, `StartAtOperationTime` for T₀ overlap, `FullDocument: UpdateLookup`, pre/post-images where supported, bounded batches, filters, and durable checkpoints. No Kafka/Redpanda/NATS/SQS is inserted into the baseline cell: active stages use bounded Go channels and cell Postgres stores durable checkpoints/events/dead letters. [infra]"
    },
    {
      "anchor_id": "numbered-list:187:cdc-delivery-semantics-derive-immutable-event-id-sha",
      "content_sha256": "2d32b5f2e2928715cdf1ab400cc91d2105a0c72ac3430ad3cd6f5b8fc1638ac0",
      "display": "187",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 244,
      "title": "CDC delivery semantics: derive immutable `event_id = SHA-256(resume_token)`; execute the shared transform; then, in one target transaction, insert `event_id` into `jumpship_applied_events` and apply the state-based upsert/delete. Only after target commit does the source checkpoint advance. A crash between commit and checkpoint causes redelivery and a target-ledger no-op — an honest at-least-once transport with exactly-once effect, not a fictional cross-database transaction. [infra]"
    },
    {
      "anchor_id": "numbered-list:188:generic-cdc-platforms-rejected-for-the-baseline-debezium",
      "content_sha256": "e84c1bd14ad5d7ff1c50cefebe28c60dab05a1133fd6d10d60469dc768953ae9",
      "display": "188",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 245,
      "title": "Generic CDC platforms rejected for the baseline: Debezium adds Kafka Connect + broker + offsets while still leaving Jumpship to build transform/apply/verification and still inherits oplog-history loss; AWS DMS samples schema, flattens documents, restricts mixed types/evolution, and conflicts with full-census/total-spec guarantees; Airbyte/Estuary add another state machine without removing Jumpship's difficult work. They may become adapter references or later corridor accelerators, never the certificate-producing Atlas→Supabase engine. [infra]"
    },
    {
      "anchor_id": "numbered-list:189:quarantine-persistence-authoritative-quarantine-lives-in-typed-postgres",
      "content_sha256": "6b447aa1e95bdc778c9f21afdcacf57bcf04e2e470e430fbd3c08a626ee2786c",
      "display": "189",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 246,
      "title": "Quarantine persistence: authoritative quarantine lives in typed Postgres tables with `mongo_id`, source artifact reference, spec/rule versions, reason code/detail, cluster signature, timestamps, resolution state, and ledger decision. Go creates deterministic signatures; DuckDB may explore/cluster large Parquet exports but cannot mark resolution. Silent drop and vendor dead-letter opacity remain impossible. [infra]"
    },
    {
      "anchor_id": "numbered-list:190:verification-data-stack-source-and-target-values-lower",
      "content_sha256": "4feb31baeb1bcadf1d0d9ccf65a67957247a71b2bc82373effc726ad5ef0bfe6",
      "display": "190",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 247,
      "title": "Verification data stack: source and target values lower into a Jumpship-defined typed canonical representation encoded as canonical CBOR (`fxamacker/cbor`) with explicit BSON tags and missing-vs-null semantics; customer-visible record/field/manifests use SHA-256. Apache Arrow/Parquet stores sorted manifest partitions; DuckDB performs disk-backed external sort/join/aggregation across manifests and rehearsal baselines without loading them into RAM. Non-cryptographic hashes may partition work but never support the integrity certificate. [infra]"
    },
    {
      "anchor_id": "numbered-list:191:verification-signature-the-final-manifest-root-and-verdict",
      "content_sha256": "8882f6835461b428a6d16f74404e12f05cc8a9ce37bb496fd34da44242415921",
      "display": "191",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 248,
      "title": "Verification signature: the final manifest/root and verdict are signed with a dedicated asymmetric AWS KMS signing key whose policy is separate from customer-data encryption keys. Encryption CMKs are not mislabeled as signing keys. Signature input includes corridor/tool/spec versions, T₀, manifest roots, verification-layer outcomes, and rehearsal-baseline identity. [infra]"
    },
    {
      "anchor_id": "numbered-list:192:query-semantic-runner-a-jumpship-go-runner-executes",
      "content_sha256": "9056b0b1cce3e5bda56a17352c21ac406f035d8bf7fe6513e8d32899b5afd91f",
      "display": "192",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 249,
      "title": "Query-semantic runner: a Jumpship Go runner executes the captured Mongo query against the worker replica and its approved SQL translation against rehearsal/target via `pgx`, canonicalizes results, and compares values, cardinality, ordering, pagination, and error semantics. `EXPLAIN (ANALYZE, BUFFERS, FORMAT JSON)` supplies target physics; k6 may exercise smoke/throughput scenarios. The agent diagnoses deterministic diffs, not eyeballed samples. [infra]"
    },
    {
      "anchor_id": "numbered-list:193:reverse-sync-stack-where-rollback-tier-requires-it",
      "content_sha256": "e27f0a43d246c2ad864b14856a8d059e36c198d9740fbd1bc48f0e0aca4b94c1",
      "display": "193",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 250,
      "title": "Reverse-sync stack: where rollback tier requires it and Supabase capabilities permit, use a direct connection, PostgreSQL `pgoutput`, a scoped publication/replication slot, `jackc/pglogrepl`, the compiled reverse transform, and the official MongoDB driver under a separate time-bound source-write credential. Monitor LSN/slot WAL retention continuously and remove slot/publication at window close. Fallback is a target transactional-outbox trigger polled by `pgx`; if neither is authorized/supported, live reverse sync is not promised. [infra]"
    },
    {
      "anchor_id": "numbered-list:194:observability-implementation-opentelemetry-go-instruments-every-engine-tool",
      "content_sha256": "88e3e13429f2029825072ca99b7c1ed3cf6cefdf0845e610a0a4472bcbd90ed4",
      "display": "194",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 251,
      "title": "Observability implementation: OpenTelemetry Go instruments every engine/tool phase and exports through an in-cell OTel Collector to cell-scoped CloudWatch (and authorized customer observability). Required metrics include snapshot bytes/progress, census rate, load throughput/checkpoint age, CDC lag/oplog headroom/dead letters, apply latency, quarantine count, verification mismatches, and reverse-slot WAL bytes. Raw documents and field values are redacted from logs/traces by construction. [infra]"
    },
    {
      "anchor_id": "numbered-list:195:reliability-test-stack-testcontainers-for-go-runs-pinned",
      "content_sha256": "7ad033ad2d79a127c912631cf8449c1d52a9b9e2afea946e5d60f9f4fbef3e32",
      "display": "195",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 252,
      "title": "Reliability test stack: Testcontainers for Go runs pinned real MongoDB/Postgres/MinIO/Toxiproxy dependencies; Toxiproxy injects latency, disconnect, timeout, bandwidth, and half-open failures; Go built-in fuzzing plus `pgregory.net/rapid` exercise BSON/canonicalization/spec/CDC/reverse transforms; an external kill harness sends randomized `SIGKILL` during dump, COPY, map writes, apply/checkpoint boundaries, and manifest creation. Final hashes must equal an uninterrupted reference. [infra]"
    },
    {
      "anchor_id": "numbered-list:196:supply-chain-stack-every-engine-tool-image-is",
      "content_sha256": "79d94f763ca84ec9f6fdf62bb3beceb694d35638470b70eabb134fcb93dca651",
      "display": "196",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 253,
      "title": "Supply-chain stack: every engine/tool image is pinned by digest, produces a Syft SBOM, is scanned by Grype or Trivy, signed with Cosign, and promoted only after corpus, integration, kill, and corridor conformance gates. Database Tools, DuckDB, Semgrep, and other external binaries are treated as versioned inputs recorded in every engagement manifest. [infra]"
    },
    {
      "anchor_id": "numbered-list:197:build-versus-buy-boundary-adopt-established-mechanics-mongodb",
      "content_sha256": "ce9eef929232e1572f9654dbf3bb8b2ad5eaa97db5906500dc81e9a5a55f1555",
      "display": "197",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 254,
      "title": "Build-versus-buy boundary: adopt established mechanics (MongoDB backup tools/driver, Atlas API, AWS SDK, pgx/pglogrepl, CEL, Pebble, Arrow/Parquet, DuckDB, ripgrep/Semgrep/Tree-sitter, OTel, Testcontainers/Toxiproxy); build the source/target contracts, snapshot selector, full census, mapping compiler, structural transforms, batch/CDC equivalence, quarantine, idempotent apply, canonical verification, reverse transform, query verifier, gates, profiles, and signed certificate. Jumpship's IP begins where generic byte movement stops. [infra]"
    },
    {
      "anchor_id": "numbered-list:198:explicit-baseline-non-choices-no-spark-flink-kafka",
      "content_sha256": "83b48ae59fa769ebf298d04a6377d1dc45bf5505c9e64806ee3f54826f2389b6",
      "display": "198",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 255,
      "title": "Explicit baseline non-choices: no Spark/Flink, Kafka/Redpanda, Kubernetes, Lambda data path, Python record hot path, arbitrary scripting transform, arbitrary agent SQL/MCP, network cache as durable state, in-memory ID map, Supabase transaction pooler for load/replication, or managed migration product as integrity authority. Each can be reopened only by a measured corridor requirement that survives the guarantee and cell-boundary tests. [infra]"
    },
