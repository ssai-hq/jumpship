      "title": "Optional-but-recommended channels (Slack, email) presented as a collapsed secondary list/dropdown below the recommendations, each with a one-line \"what you'll miss\" (approvals land in-console only, no digests) — connectable at any later point, not just onboarding. [fe]"
    },
    {
