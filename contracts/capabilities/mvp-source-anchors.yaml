      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 147,
      "title": "Harness prime directive enforced product-wide: no silent guesses — every ambiguity terminates in either a human answer or a ledgered, reversible assumption. [agent]"
    },
    {
      "anchor_id": "numbered-list:123:division-of-labor-rule-enforced-product-wide-jumpship",
      "content_sha256": "338dc349d64a03d4613da2b62fdd94d15a6d06d10b3010c549aa7f15b92dbefa",
      "display": "123",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 1,
      "source_line": 148,
      "title": "Division-of-labor rule enforced product-wide: Jumpship autonomously does everything cheaply undoable and never asks permission for reversible work; the human supplies tacit knowledge and exactly two consents (flip, decommission). [agent]"
    },
    {
      "anchor_id": "numbered-list:124:region-aware-worker-placement-the-source-s-cloud",
      "content_sha256": "2ec35506d91510f6b70223ba31e0812a9f3d6d2c19c5bc450566b32665915d37",
      "display": "124",
      "kind": "numbered-list",
      "occurrence": 1,
      "occurrence_count": 4,
      "source_line": 149,
      "title": "Region-aware worker placement: the source's cloud region is auto-detected from the connection string, and the migration worker is provisioned in that same region — customer data rides the provider's private backbone (peering/private endpoints where granted) instead of the public internet; the connect screen states the placement and its consequence (near-zero source-side transfer fees, lower CDC lag) as part of the security statement. (EC2 worker launched in the source's AWS region; VPC peering / PrivateLink to Atlas where granted — same-region transfer $0.00–0.01/GB vs $0.09+/GB internet egress billed to the customer's Atlas account.) [infra]"
    },
    {
      "anchor_id": "numbered-list:125:target-region-as-a-day-1-decision-card",
      "content_sha256": "7dad168d1224736db4f3040316d588fa423063fe89e5c476bbae37b3a5522fc6",
