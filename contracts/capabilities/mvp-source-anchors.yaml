      "title": "Log-pattern watch (read-only) for known post-cutover signatures — serialization/deadlock errors, lost updates, case-sensitivity misses — each alert arriving with its specific translation-table fix attached; Jumpship flags, the app team fixes. [infra]"
    },
    {
