      "kind": "numbered-list",
      "occurrence": 3,
      "occurrence_count": 3,
      "source_line": 157,
      "title": "Design brief first render carries the design confirm — one big Approve button that accepts the recommended design and unblocks rehearsal loading; a reversible confirm, not a consent (the design stays recompilable on rehearsal branches until cutover, per #123), ledgered like any ruling with its undo path stated on the button. [fe]"
    },
    {
      "anchor_id": "numbered-list:126:after-first-render-the-design-brief-persists-as",
