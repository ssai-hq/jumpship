{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "$id": "https://jumpship.dev/contracts/dependency-request-v1.schema.json",
  "title": "Jumpship serialized root dependency request",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "schema_version",
    "request_id",
    "packet_id",
    "status",
    "created_at",
    "requested_by",
    "dependencies",
    "affected_lockfiles",
    "affected_builds",
    "risk",
    "validation_requirements"
  ],
  "allOf": [
    {
      "if": {
        "properties": {
          "status": {
            "const": "proposed"
          }
        },
        "required": [
          "status"
        ]
      },
      "then": {
        "not": {
          "anyOf": [
            {
              "required": [
                "approval"
              ]
            },
            {
              "required": [
                "rejection_reason"
              ]
            }
          ]
        }
      }
    },
    {
      "if": {
        "properties": {
          "status": {
            "enum": [
              "accepted",
              "applied"
            ]
          }
        },
        "required": [
          "status"
        ]
      },
      "then": {
        "required": [
          "approval"
        ],
        "not": {
          "required": [
            "rejection_reason"
          ]
        }
      }
    },
    {
      "if": {
        "properties": {
          "status": {
            "const": "rejected"
          }
        },
        "required": [
          "status"
        ]
      },
      "then": {
        "required": [
          "rejection_reason"
        ],
        "not": {
          "required": [
            "approval"
          ]
        }
      }
    }
  ],
  "properties": {
    "schema_version": {
      "const": 1
    },
    "request_id": {
      "type": "string",
      "pattern": "^P[0-9]{2}-dep-[a-z0-9]+(?:-[a-z0-9]+)*$"
    },
    "packet_id": {
      "type": "string",
      "pattern": "^P(?:0[2-9]|1[0-9]|2[0-8])$"
    },
    "status": {
      "enum": [
        "proposed",
        "accepted",
        "rejected",
        "applied"
      ]
    },
    "created_at": {
      "type": "string",
      "format": "date-time",
      "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
    },
    "requested_by": {
      "type": "string",
      "minLength": 1
    },
    "dependencies": {
      "type": "array",
      "minItems": 1,
      "uniqueItems": true,
      "items": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "ecosystem",
          "name",
          "version",
          "license",
          "purpose",
          "source_url",
          "integrity",
          "direct_runtime_dependency"
        ],
        "properties": {
          "ecosystem": {
            "enum": [
              "go",
              "pnpm",
              "tool"
            ]
          },
          "name": {
            "type": "string",
            "pattern": "^[A-Za-z0-9@._/+:-]+$"
          },
          "version": {
            "type": "string",
            "pattern": "^v?[0-9]+(?:\\.[0-9A-Za-z-]+)+(?:\\+[0-9A-Za-z.-]+)?$"
          },
          "license": {
            "enum": [
              "0BSD",
              "Apache-2.0",
              "BSD-2-Clause",
              "BSD-3-Clause",
              "BlueOak-1.0.0",
              "CC-BY-4.0",
              "GPL-2.0-only",
              "GPL-2.0-or-later",
              "GPL-3.0-only",
              "GPL-3.0-or-later",
              "ISC",
              "LGPL-2.1-only",
              "LGPL-2.1-or-later",
              "LGPL-3.0-only",
              "LGPL-3.0-or-later",
              "MIT",
              "MPL-2.0",
              "PostgreSQL",
              "Unicode-3.0"
            ]
          },
          "purpose": {
            "type": "string",
            "minLength": 8
          },
          "source_url": {
            "type": "string",
            "pattern": "^https://\\S+$"
          },
          "integrity": {
            "type": "object",
            "additionalProperties": false,
            "required": [
              "algorithm",
              "value",
              "source_url"
            ],
            "properties": {
              "algorithm": {
                "enum": [
                  "sha256",
                  "sha512",
                  "npm-sri",
                  "go-sum",
                  "oci-digest"
                ]
              },
              "value": {
                "type": "string",
                "minLength": 16
              },
              "source_url": {
                "type": "string",
                "pattern": "^https://\\S+$"
              }
            },
            "allOf": [
              {
                "if": {
                  "properties": {
                    "algorithm": {
                      "const": "sha256"
                    }
                  },
                  "required": [
                    "algorithm"
                  ]
                },
                "then": {
                  "properties": {
                    "value": {
                      "pattern": "^[0-9a-f]{64}$"
                    }
                  }
                }
              },
              {
                "if": {
                  "properties": {
                    "algorithm": {
                      "const": "sha512"
                    }
                  },
                  "required": [
                    "algorithm"
                  ]
                },
                "then": {
                  "properties": {
                    "value": {
                      "pattern": "^[0-9a-f]{128}$"
                    }
                  }
                }
              },
              {
                "if": {
                  "properties": {
                    "algorithm": {
                      "const": "npm-sri"
                    }
                  },
                  "required": [
                    "algorithm"
                  ]
                },
                "then": {
                  "properties": {
                    "value": {
                      "pattern": "^sha512-[A-Za-z0-9+/]{86}==$"
                    }
                  }
                }
              },
              {
                "if": {
                  "properties": {
                    "algorithm": {
                      "const": "go-sum"
                    }
                  },
                  "required": [
                    "algorithm"
                  ]
                },
                "then": {
                  "properties": {
                    "value": {
                      "pattern": "^h1:[A-Za-z0-9+/]{43}=$"
                    }
                  }
                }
              },
              {
                "if": {
                  "properties": {
                    "algorithm": {
                      "const": "oci-digest"
                    }
                  },
                  "required": [
                    "algorithm"
                  ]
                },
                "then": {
                  "properties": {
                    "value": {
                      "pattern": "^sha256:[0-9a-f]{64}$"
                    }
                  }
                }
              }
            ]
          },
          "direct_runtime_dependency": {
            "type": "boolean"
          }
        }
      }
    },
    "affected_lockfiles": {
      "type": "array",
      "minItems": 1,
      "uniqueItems": true,
      "items": {
        "enum": [
          "go.mod",
          "go.sum",
          "package.json",
          "web/package.json",
          "pnpm-lock.yaml",
          ".tool-versions",
          "mise.toml",
          "tools/manifest.yaml"
        ]
      }
    },
    "affected_builds": {
      "type": "array",
      "minItems": 1,
      "uniqueItems": true,
      "items": {
        "type": "string",
        "minLength": 1
      }
    },
    "risk": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "security_sensitive",
        "data_boundary_impact",
        "justification"
      ],
      "properties": {
        "security_sensitive": {
          "type": "boolean"
        },
        "data_boundary_impact": {
          "enum": [
            "none",
            "review-required"
          ]
        },
        "justification": {
          "type": "string",
          "minLength": 8
        }
      }
    },
    "validation_requirements": {
      "type": "array",
      "minItems": 3,
      "uniqueItems": true,
      "items": {
        "enum": [
          "license",
          "vulnerability",
          "clean-clone"
        ]
      }
    },
    "approval": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "decision_id",
        "approved_by",
        "approver_role",
        "approved_at"
      ],
      "properties": {
        "decision_id": {
          "type": "string",
          "minLength": 1
        },
        "approved_by": {
          "type": "string",
          "minLength": 1
        },
        "approver_role": {
          "const": "p01-root-lock-steward"
        },
        "approved_at": {
          "type": "string",
          "format": "date-time",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        }
      }
    },
    "rejection_reason": {
      "type": "string",
      "minLength": 1
    }
  }
}
